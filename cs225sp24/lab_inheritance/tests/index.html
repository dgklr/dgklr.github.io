<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/lab_inheritance/tests</title>
    <link rel="stylesheet" href="https://dgklr.github.io/cs225sp24/style.css">
    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            document.querySelectorAll('.file-block').forEach(block => {
                block.addEventListener('click', () => {
                    window.location.href = block.getAttribute('data-href'); // 为整个文件区块设置跳转
                });
            });

            document.querySelectorAll('.source-link').forEach(link => {
                link.addEventListener('click', (event) => {
                    event.stopPropagation(); // 阻止冒泡到文件区块的点击事件
                    window.location.href = link.getAttribute('data-source-href'); // 为"源文件"设置特定的跳转
                });
            });
        });
    </script>
</head>
<body>
    <div class="header">
        <h2>/lab_inheritance/tests</h2>
        <a href="https://dgklr.github.io/cs225sp24/lab_inheritance" class="back-button">返回上一页</a>
    </div>
    <div class="file-manager">
        <div class="folders">
            <h3>文件夹</h3>

        </div>
        <div class="files">
            <h3>文件</h3>            <a href="https://dgklr.github.io/cs225sp24/lab_inheritance/tests/basic.cpp.html" class="folder-link">basic.cpp</a>
            <a href="https://dgklr.github.io/cs225sp24/lab_inheritance/tests/catch.hpp.html" class="folder-link">catch.hpp</a>
            <a href="https://dgklr.github.io/cs225sp24/lab_inheritance/tests/catchlib.h.html" class="folder-link">catchlib.h</a>
            <a href="https://dgklr.github.io/cs225sp24/lab_inheritance/tests/soln_flower.png" class="folder-link">soln_flower.png</a>
            <a href="https://dgklr.github.io/cs225sp24/lab_inheritance/tests/soln_flower_old.png" class="folder-link">soln_flower_old.png</a>
            <a href="https://dgklr.github.io/cs225sp24/lab_inheritance/tests/soln_truck.png" class="folder-link">soln_truck.png</a>

        </div>
    </div>
</body>
</html>
