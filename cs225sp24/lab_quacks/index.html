<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/lab_quacks</title>
    <link rel="stylesheet" href="https://dgklr.github.io/cs225sp24/style.css">
    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            document.querySelectorAll('.file-block').forEach(block => {
                block.addEventListener('click', () => {
                    window.location.href = block.getAttribute('data-href'); // 为整个文件区块设置跳转
                });
            });

            document.querySelectorAll('.source-link').forEach(link => {
                link.addEventListener('click', (event) => {
                    event.stopPropagation(); // 阻止冒泡到文件区块的点击事件
                    window.location.href = link.getAttribute('data-source-href'); // 为"源文件"设置特定的跳转
                });
            });
        });
    </script>
</head>
<body>
    <div class="header">
        <h2>/lab_quacks</h2>
        <a href="https://dgklr.github.io/cs225sp24" class="back-button">返回上一页</a>
    </div>
    <div class="file-manager">
        <div class="folders">
            <h3>文件夹</h3>
            <a href="https://dgklr.github.io/cs225sp24/lab_quacks/feedback" class="folder-link">feedback</a>            <a href="https://dgklr.github.io/cs225sp24/lab_quacks/tests" class="folder-link">tests</a>
        </div>
        <div class="files">
            <h3>文件</h3>
            <div class="file-block" data-href="https://dgklr.github.io/cs225sp24/lab_quacks/exercises.cpp.html">
                <span>exercises.cpp</span>
                <span class="source-link" data-source-href="https://dgklr.github.io/cs225sp24/lab_quacks/exercises.cpp">源文件</span>
            </div>

            <div class="file-block" data-href="https://dgklr.github.io/cs225sp24/lab_quacks/exercises.d">
                <span>exercises.d</span>
            </div>

            <div class="file-block" data-href="https://dgklr.github.io/cs225sp24/lab_quacks/exercises.h.html">

            </div>

            <div class="file-block" data-href="https://dgklr.github.io/cs225sp24/lab_quacks/exercises.o">

            <div class="file-block" data-href="https://dgklr.github.io/cs225sp24/lab_quacks/main.cpp.html">

            <div class="file-block" data-href="https://dgklr.github.io/cs225sp24/lab_quacks/Makefile">

            <div class="file-block" data-href="https://dgklr.github.io/cs225sp24/lab_quacks/quackfun.cpp.html">
                <span>quackfun.cpp</span>
                <span class="source-link" data-source-href="https://dgklr.github.io/cs225sp24/lab_quacks/quackfun.cpp">源文件</span>

</html>
