    <title>/lab_trees</title>
    <link rel="stylesheet" href="https://dgklr.github.io/cs225sp24/style.css">
    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            document.querySelectorAll('.file-block').forEach(block => {
                block.addEventListener('click', () => {
                    window.location.href = block.getAttribute('data-href'); // 为整个文件区块设置跳转
                });
            });

            document.querySelectorAll('.source-link').forEach(link => {
                link.addEventListener('click', (event) => {
                    event.stopPropagation(); // 阻止冒泡到文件区块的点击事件
                    window.location.href = link.getAttribute('data-source-href'); // 为"源文件"设置特定的跳转
                });
            });
        });
    </script>
</head>
