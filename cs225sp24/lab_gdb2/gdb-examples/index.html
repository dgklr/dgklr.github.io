<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/lab_gdb2/gdb-examples</title>
    <link rel="stylesheet" href="https://dgklr.github.io/cs225sp24/style.css">
    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            document.querySelectorAll('.file-block').forEach(block => {
                block.addEventListener('click', () => {
                    window.location.href = block.getAttribute('data-href'); // 为整个文件区块设置跳转
                });
            });

            document.querySelectorAll('.source-link').forEach(link => {
                link.addEventListener('click', (event) => {
                    event.stopPropagation(); // 阻止冒泡到文件区块的点击事件
                    window.location.href = link.getAttribute('data-source-href'); // 为"源文件"设置特定的跳转
                });
            });
        });
    </script>
</head>
<body>
    <div class="header">
        <h2>/lab_gdb2/gdb-examples</h2>
        <a href="https://dgklr.github.io/cs225sp24/lab_gdb2" class="back-button">返回上一页</a>
    </div>
    <div class="file-manager">
        <div class="folders">
            <h3>文件夹</h3>

        </div>
        <div class="files">
            <h3>文件</h3>            <a href="https://dgklr.github.io/cs225sp24/lab_gdb2/gdb-examples/list.cpp.html" class="folder-link">list.cpp</a>
            <a href="https://dgklr.github.io/cs225sp24/lab_gdb2/gdb-examples/loop.cpp.html" class="folder-link">loop.cpp</a>
            <a href="https://dgklr.github.io/cs225sp24/lab_gdb2/gdb-examples/playground.cpp.html" class="folder-link">playground.cpp</a>
            <a href="https://dgklr.github.io/cs225sp24/lab_gdb2/gdb-examples/recurse.cpp.html" class="folder-link">recurse.cpp</a>
            <a href="https://dgklr.github.io/cs225sp24/lab_gdb2/gdb-examples/swap.cpp.html" class="folder-link">swap.cpp</a>
            <a href="https://dgklr.github.io/cs225sp24/lab_gdb2/gdb-examples/switch.cpp.html" class="folder-link">switch.cpp</a>

        </div>
    </div>
</body>
</html>
