<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件管理器</title>
    <link rel="stylesheet" href="style.css">
    <script>
        function openSourceUrl(event, url) {
            event.stopPropagation(); // Prevent triggering the parent's link
            window.location.href = url; // Open the source URL
        }
    </script>
</head>
<body>
    <div class="header">
        <h2>文件管理器</h2>
        <a href="#" class="back-button">返回上一页</a>
    </div>
    <div class="file-manager">
        <div class="folders">
            <h3>文件夹</h3>
            <a href="#" class="folder-link">文件夹1</a>
            <a href="#" class="folder-link">文件夹2</a>
            <a href="#" class="folder-link">文件夹3</a>
        </div>
        <div class="files">
            <h3>文件</h3>
            <a href="#" class="file-block">
                <span>文件1.txt</span>
                <span class="source-link" onclick="openSourceUrl(event, 'http://example.com/source1')">源文件</span>
            </a>
            <a href="#" class="file-block">
                <span>文件2.pdf</span>
                <span class="source-link" onclick="openSourceUrl(event, 'http://example.com/source2')">源文件</span>
            </a>
            <a href="#" class="file-block">
                <span>文件3.jpg</span>
            </a>
        </div>
    </div>
</body>
</html>
