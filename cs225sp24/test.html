<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件管理器</title>
    <link rel="stylesheet" href="https://dgklr.github.io/cs225sp24/style.css">
    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            document.querySelectorAll('.file-block').forEach(block => {
                block.addEventListener('click', () => {
                    window.location.href = block.getAttribute('data-href'); // 为整个文件区块设置跳转
                });
            });

            document.querySelectorAll('.source-link').forEach(link => {
                link.addEventListener('click', (event) => {
                    event.stopPropagation(); // 阻止冒泡到文件区块的点击事件
                    window.location.href = link.getAttribute('data-source-href'); // 为"源文件"设置特定的跳转
                });
            });
        });
    </script>
</head>
<body>
    <div class="header">
        <h2>文件管理器</h2>
        <a href="#" class="back-button">返回上一页</a>
    </div>
    <div class="file-manager">
        <div class="folders">
            <h3>文件夹</h3>
            <div class="folder-link" data-href="http://example.com/folder1">文件夹1</div>
            <div class="folder-link" data-href="http://example.com/folder2">文件夹2</div>
            <div class="folder-link" data-href="http://example.com/folder3">文件夹3</div>
        </div>
        <div class="files">
            <h3>文件</h3>
            <div class="file-block" data-href="http://example.com/file1">
                <span>文件1.txt</span>
                <span class="source-link" data-source-href="http://example.com/source1">源文件</span>
            </div>
            <div class="file-block" data-href="http://example.com/file2">
                <span>文件2.pdf</span>
                <span class="source-link" data-source-href="http://example.com/source2">源文件</span>
            </div>
            <div class="file-block" data-href="http://example.com/file3">
                <span>文件3.jpg</span>
                <span class="source-link" data-source-href="http://example.com/source3">源文件</span>
            </div>
        </div>
    </div>
</body>
</html>
