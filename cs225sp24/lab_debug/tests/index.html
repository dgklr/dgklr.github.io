<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/lab_debug/tests</title>
    <link rel="stylesheet" href="https://dgklr.github.io/cs225sp24/style.css">
    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            document.querySelectorAll('.file-block').forEach(block => {
                block.addEventListener('click', () => {
                    window.location.href = block.getAttribute('data-href'); // 为整个文件区块设置跳转
                });
            });

            document.querySelectorAll('.source-link').forEach(link => {
                link.addEventListener('click', (event) => {
                    event.stopPropagation(); // 阻止冒泡到文件区块的点击事件
                    window.location.href = link.getAttribute('data-source-href'); // 为"源文件"设置特定的跳转
                });
            });
        });
    </script>
</head>
<body>
    <div class="header">
        <h2>/lab_debug/tests</h2>
        <a href="https://dgklr.github.io/cs225sp24/lab_debug" class="back-button">返回上一页</a>
    </div>
    <div class="file-manager">
        <div class="folders">
            <h3>文件夹</h3>

        </div>
        <div class="files">
            <h3>文件</h3>
            <div class="file-block" data-href="https://dgklr.github.io/cs225sp24/lab_debug/tests/catch.hpp.html">
                <span>catch.hpp</span>
                <span class="source-link" data-source-href="https://dgklr.github.io/cs225sp24/lab_debug/tests/catch.hpp">源文件</span>
            </div>

            <div class="file-block" data-href="https://dgklr.github.io/cs225sp24/lab_debug/tests/in_01.png">
                <span>in_01.png</span>
            </div>

            <div class="file-block" data-href="https://dgklr.github.io/cs225sp24/lab_debug/tests/in_02.png">
                <span>in_02.png</span>
            </div>

            <div class="file-block" data-href="https://dgklr.github.io/cs225sp24/lab_debug/tests/in_03.png">
                <span>in_03.png</span>
            </div>

            <div class="file-block" data-href="https://dgklr.github.io/cs225sp24/lab_debug/tests/out.png">
                <span>out.png</span>
            </div>

            <div class="file-block" data-href="https://dgklr.github.io/cs225sp24/lab_debug/tests/out_01.png">
                <span>out_01.png</span>
            </div>

            <div class="file-block" data-href="https://dgklr.github.io/cs225sp24/lab_debug/tests/out_02.png">
                <span>out_02.png</span>

            <div class="file-block" data-href="https://dgklr.github.io/cs225sp24/lab_debug/tests/out_03.png">
                <span>out_03.png</span>
            </div>

            <div class="file-block" data-href="https://dgklr.github.io/cs225sp24/lab_debug/tests/unit_tests.cpp.html">
                <span>unit_tests.cpp</span>
                <span class="source-link" data-source-href="https://dgklr.github.io/cs225sp24/lab_debug/tests/unit_tests.cpp">源文件</span>
            </div>

            <div class="file-block" data-href="https://dgklr.github.io/cs225sp24/lab_debug/tests/unit_tests.o">
                <span>unit_tests.o</span>
            </div>

        </div>
    </div>
</body>
</html>
